
$brightnessLowTimeout = 120
$lockSessionTimeout = 300
$suspendTimeout = 600

general {
    lock_cmd = pidof hyprlock || hyprlock
    ignore_dbus_inhibit = false
    before_sleep_cmd = loginctl lock-session
}

listener {
    timeout = $brightnessLowTimeout
    on-timeout = bash -c 'curr=$(brightnessctl get); new=$((curr/2)); brightnessctl set ${new}'
    on-resume = bash -c 'curr=$(brightnessctl get); new=$((curr*2)); brightnessctl set ${new}'
}

listener {
    timeout = $lockSessionTimeout
    on-timeout = loginctl lock-session
}

listener {
    timeout = $suspendTimeout
    on-timeout = systemctl suspend || loginctl suspend
}

